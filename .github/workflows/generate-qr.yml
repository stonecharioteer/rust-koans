name: Generate QR Code

on:
  push:
    branches: [main]
    paths:
      - CNAME
      - generate_qr.py
      - pyproject.toml

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Generate QR code
        run: uv run generate_qr.py

      - name: Convert to WebP
        run: |
          sudo apt-get install -y -qq webp > /dev/null 2>&1
          cwebp -q 90 qr.png -o qr.webp

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add qr.png qr.webp
          git diff --cached --quiet || git commit -m "chore: regenerate QR code" && git push
